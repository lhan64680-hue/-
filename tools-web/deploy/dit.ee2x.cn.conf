limit_req_zone $binary_remote_addr zone=cinevault_support:10m rate=12r/m;

server {
    listen 80;
    server_name __DOMAIN__;

    root /www/sites/__DOMAIN__;
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /www/sites/__DOMAIN__/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/__DOMAIN__/ssl/privkey.pem;

    root /www/sites/__DOMAIN__;
    index index.html;
    charset utf-8;

    client_max_body_size 64k;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-src 'self'; font-src 'self';" always;

    location ^~ /api/cinevault-support/ {
        limit_req zone=cinevault_support burst=8 nodelay;
        proxy_pass http://127.0.0.1:__CINEVAULT_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    location ~* ^/downloads/.+\.exe$ {
        try_files $uri =404;
        default_type application/vnd.microsoft.portable-executable;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 1d;
    }

    location = /downloads/release.json {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location = /sponsors-admin.html {
        try_files $uri =404;
        expires -1;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store" always;
    }

    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~* \.(?:png|jpg|jpeg|webp|ico|svg)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
